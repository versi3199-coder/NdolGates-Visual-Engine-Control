<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NdolGates Control Center</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080d;
    --surface: #0d1018;
    --panel: #111520;
    --border: #1e2535;
    --accent: #00d4ff;
    --accent2: #7b2fff;
    --gold: #f0a500;
    --green: #00ff88;
    --red: #ff3355;
    --orange: #ff8c00;
    --text: #c8d8f0;
    --muted: #4a5568;
    --glow: 0 0 12px rgba(0,212,255,0.4);
    --glow-green: 0 0 12px rgba(0,255,136,0.4);
    --glow-red: 0 0 12px rgba(255,51,85,0.4);
    --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 14px; }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--r);
    margin-bottom: 12px; position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
    animation: scanline 3s linear infinite; background-size: 200% 100%;
  }
  @keyframes scanline { 0%{background-position:0%} 100%{background-position:200%} }
  .logo-text { font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
  .logo-sub { font-size: 0.65rem; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-top: 2px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--green);
    background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2);
    padding: 5px 10px; border-radius: 20px;
  }
  .live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  /* PANELS */
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px; margin-bottom: 12px;
  }
  .section-title {
    font-size: 0.62rem; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* IP */
  .ip-row { display: flex; gap: 8px; align-items: center; }
  .ip-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; color: var(--accent);
    font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
    padding: 10px 12px; outline: none; transition: border-color 0.2s;
  }
  .ip-input:focus { border-color: var(--accent); }
  .btn-save {
    background: var(--accent2); color: #fff; border: none; border-radius: 7px;
    padding: 10px 14px; font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 0.85rem; cursor: pointer;
  }
  .btn-save:active { opacity: 0.8; }
  .ip-hint { font-size: 0.62rem; color: var(--muted); margin-top: 6px; font-family: 'Share Tech Mono', monospace; }

  /* CONNECT STATUS BAR */
  .connect-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 12px; margin-top: 10px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.68rem;
  }
  .connect-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--muted); transition: background 0.3s; }
  .connect-dot.ok { background: var(--green); box-shadow: var(--glow-green); }
  .connect-dot.fail { background: var(--red); }
  .connect-dot.checking { background: var(--orange); animation: pulse 0.8s infinite; }
  .connect-text { flex: 1; color: var(--text); }
  .connect-count { color: var(--muted); font-size: 0.6rem; }

  /* GLOBAL BUTTONS */
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 12px 8px; border: none; border-radius: 8px;
    font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
    font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .btn:active { transform: scale(0.96); }
  .btn-start { background: linear-gradient(135deg,#00b36b,#00ff88); color: #001a0d; box-shadow: var(--glow-green); }
  .btn-stop  { background: linear-gradient(135deg,#cc1133,#ff3355); color: #fff; box-shadow: var(--glow-red); }
  .btn-pause { background: linear-gradient(135deg,#cc6600,#ff8c00); color: #fff; }
  .btn-refresh {
    background: var(--surface); color: var(--accent);
    border: 1px solid var(--border);
    flex: 0 0 44px; font-size: 1.1rem;
  }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 12px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 6px; text-align: center; }
  .stat-val { font-size: 1.4rem; font-weight: 700; font-family: 'Share Tech Mono', monospace; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.55rem; color: var(--muted); letter-spacing: 1.5px; margin-top: 3px; }

  /* INSTANCE GRID */
  .instances-title {
    font-size: 0.62rem; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
    font-family: 'Share Tech Mono', monospace;
  }
  .instance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .instance-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r); padding: 11px;
    transition: border-color 0.3s; position: relative; overflow: hidden;
  }
  .instance-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--border); transition: background 0.3s;
  }
  .instance-card.st-idle::before    { background: var(--green); }
  .instance-card.st-running::before { background: var(--accent); animation: blink 1s ease-in-out infinite; }
  .instance-card.st-error::before   { background: var(--red); }
  .instance-card.st-paused::before  { background: var(--orange); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .instance-card.st-idle    { border-color: rgba(0,255,136,0.15); }
  .instance-card.st-running { border-color: rgba(0,212,255,0.25); }
  .instance-card.st-error   { border-color: rgba(255,51,85,0.2); }
  .instance-card.st-paused  { border-color: rgba(255,140,0,0.2); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .card-id { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; line-height: 1; }
  .card-port { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 2px; }
  .card-badge {
    font-size: 0.55rem; font-weight: 700; letter-spacing: 1px;
    padding: 3px 6px; border-radius: 4px; text-transform: uppercase; white-space: nowrap;
  }
  .badge-offline { background: rgba(74,85,104,0.3); color: var(--muted); }
  .badge-idle    { background: rgba(0,255,136,0.12); color: var(--green); }
  .badge-running { background: rgba(0,212,255,0.12); color: var(--accent); }
  .badge-error   { background: rgba(255,51,85,0.12); color: var(--red); }
  .badge-paused  { background: rgba(255,140,0,0.12); color: var(--orange); }

  /* PROGRESS BAR */
  .progress-wrap { margin: 7px 0 5px; }
  .progress-label {
    font-size: 0.6rem; color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px; display: block;
  }
  .progress-track {
    height: 4px; background: var(--surface);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: var(--border);
    transition: width 0.6s ease, background 0.3s;
    width: 0%;
  }
  .pf-idle    { background: var(--green); }
  .pf-running { background: linear-gradient(90deg, var(--accent2), var(--accent)); animation: shimmer 1.5s linear infinite; background-size: 200% 100%; }
  .pf-error   { background: var(--red); }
  .pf-paused  { background: var(--orange); }
  @keyframes shimmer { 0%{background-position:100%} 100%{background-position:-100%} }

  .card-step {
    font-size: 0.62rem; color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .card-videos { font-size: 0.62rem; color: var(--gold); font-family: 'Share Tech Mono', monospace; }
  .card-uptime { font-size: 0.58rem; color: var(--muted); font-family: 'Share Tech Mono', monospace; }

  .card-actions { display: flex; gap: 5px; margin-top: 8px; }
  .card-btn {
    flex: 1; padding: 5px 0;
    border: 1px solid var(--border); border-radius: 5px;
    background: var(--surface); color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 0.68rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .card-btn.go   { color: var(--green); border-color: rgba(0,255,136,0.25); }
  .card-btn.halt { color: var(--red);   border-color: rgba(255,51,85,0.25); }
  .card-btn:active { opacity: 0.7; transform: scale(0.95); }

  /* LOG */
  .log-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px;
    height: 130px; overflow-y: auto;
    font-family: 'Share Tech Mono', monospace; font-size: 0.63rem; line-height: 1.8;
  }
  .log-entry         { color: var(--muted); }
  .log-entry.ok      { color: var(--green); }
  .log-entry.err     { color: var(--red); }
  .log-entry.info    { color: var(--accent); }
  .log-entry.warn    { color: var(--orange); }
  .log-entry.connect { color: #a0f0c0; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--accent); color: var(--accent);
    padding: 10px 20px; border-radius: 20px;
    font-size: 0.78rem; font-family: 'Share Tech Mono', monospace;
    z-index: 999; opacity: 0; transition: opacity 0.3s;
    white-space: nowrap; box-shadow: var(--glow); max-width: 90vw;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 340px) { .instance-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="logo-text">⚡ NDOLGATES</div>
      <div class="logo-sub">VISUAL ENGINE v2.0 — CONTROL CENTER</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>LIVE
    </div>
  </div>

  <!-- IP CONFIG -->
  <div class="panel">
    <div class="section-title">🖥 IP Komputer (Tailscale PC)</div>
    <div class="ip-row">
      <input class="ip-input" id="serverIp" type="text" placeholder="100.x.x.x" maxlength="20">
      <button class="btn-save" onclick="saveIp()">KONEK</button>
    </div>
    <div class="ip-hint">Gunakan IP Tailscale PC: <strong>100.75.147.23</strong></div>
    <!-- CONNECTION STATUS BAR -->
    <div class="connect-bar" id="connectBar">
      <div class="connect-dot" id="connectDot"></div>
      <span class="connect-text" id="connectText">Belum terhubung — isi IP lalu klik KONEK</span>
      <span class="connect-count" id="connectCount"></span>
    </div>
  </div>

  <!-- GLOBAL CONTROL -->
  <div class="panel">
    <div class="section-title">🌐 Kontrol Global (Semua Instance)</div>
    <div class="btn-row">
      <button class="btn btn-start" onclick="runAll('start')">▶ JALANKAN</button>
      <button class="btn btn-pause" onclick="runAll('pause')">⏸ JEDA</button>
      <button class="btn btn-stop"  onclick="runAll('stop')">⏹ STOP</button>
      <button class="btn btn-refresh" onclick="refreshAll(false)" title="Refresh">↻</button>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val" id="statOnline" style="color:var(--green)">—</div>
        <div class="stat-label">ONLINE</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statRunning">—</div>
        <div class="stat-label">RUNNING</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statError" style="color:var(--red)">—</div>
        <div class="stat-label">ERROR</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statVideos" style="color:var(--gold)">—</div>
        <div class="stat-label">VIDEOS</div>
      </div>
    </div>
  </div>

  <!-- INSTANCE CARDS -->
  <div class="instances-title">📡 STATUS 11 INSTANCE</div>
  <div class="instance-grid" id="instanceGrid"></div>

  <!-- LOG -->
  <div class="panel" style="margin-top:12px">
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span>📋 Activity Log</span>
      <span onclick="clearLog()" style="cursor:pointer;color:var(--muted);font-size:0.6rem">HAPUS</span>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const INSTANCES = [
  {id:'A',port:5500},{id:'B',port:5501},{id:'C',port:5502},
  {id:'D',port:5503},{id:'E',port:5504},{id:'F',port:5505},
  {id:'G',port:5506},{id:'H',port:5507},{id:'I',port:5508},
  {id:'J',port:5509},{id:'K',port:5510},
];

// STEP LABELS & PROGRESS %
const STEP_MAP = {
  'Siap': { pct: 0, label: 'Menunggu perintah' },
  'Menunggu eksekusi extension...': { pct: 5, label: 'Menunggu extension...' },
  'analyze': { pct: 15, label: 'Analisis channel...' },
  'generate_prompt': { pct: 30, label: 'Generate prompt...' },
  'leonardo': { pct: 50, label: 'Render di Leonardo...' },
  'render_loop': { pct: 70, label: 'FFmpeg render video...' },
  'caption': { pct: 85, label: 'Generate caption...' },
  'upload': { pct: 95, label: 'Upload ke platform...' },
  'Dihentikan manual': { pct: 0, label: 'Dihentikan' },
  'Dijeda manual': { pct: 0, label: 'Dijeda' },
};

function getStepInfo(step) {
  if (!step) return { pct: 0, label: 'Siap' };
  for (const key of Object.keys(STEP_MAP)) {
    if (step.toLowerCase().includes(key.toLowerCase())) return STEP_MAP[key];
  }
  return { pct: 10, label: step };
}

let serverIp = localStorage.getItem('ndol_ip') || '';
let instanceData = {};
let autoTimer = null;
let isConnected = false;

// ── IP & CONNECT ──────────────────────────────
function saveIp() {
  const val = document.getElementById('serverIp').value.trim();
  if (!val) return showToast('Masukkan IP Tailscale PC dulu!');
  serverIp = val;
  localStorage.setItem('ndol_ip', val);
  setConnectStatus('checking', `Menghubungkan ke ${val}...`, '');
  addLog('info', `🔌 Mencoba konek ke ${val}...`);
  refreshAll(false);
}

function getUrl(port, ep) { return `http://${serverIp}:${port}${ep}`; }

function setConnectStatus(state, text, count) {
  const dot  = document.getElementById('connectDot');
  const txt  = document.getElementById('connectText');
  const cnt  = document.getElementById('connectCount');
  dot.className = 'connect-dot ' + state;
  txt.textContent = text;
  cnt.textContent = count;
}

// ── FETCH STATUS ──────────────────────────────
async function fetchOne(inst) {
  try {
    const res = await fetch(getUrl(inst.port, '/status'), { signal: AbortSignal.timeout(3000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    instanceData[inst.id] = { ...data, _online: true };
  } catch {
    instanceData[inst.id] = { status: 'offline', current_step: null, videos_done: 0, _online: false };
  }
}

async function refreshAll(silent = true) {
  if (!serverIp) return;
  const prev = {};
  INSTANCES.forEach(i => { prev[i.id] = instanceData[i.id]?.status; });

  await Promise.all(INSTANCES.map(fetchOne));

  // Connection status
  const online = INSTANCES.filter(i => instanceData[i.id]?._online).length;
  const total  = INSTANCES.length;
  if (online === 0) {
    if (isConnected || !silent) {
      addLog('err', `❌ Tidak bisa terhubung ke ${serverIp} — pastikan server jalan & Tailscale aktif`);
      isConnected = false;
    }
    setConnectStatus('fail', `Gagal terhubung ke ${serverIp}`, '');
  } else {
    if (!isConnected) {
      addLog('connect', `✅ TERHUBUNG ke ${serverIp} — ${online}/${total} server online`);
      isConnected = true;
    }
    setConnectStatus('ok', `Terhubung ke ${serverIp}`, `${online}/${total} online`);
  }

  // Log perubahan status per instance
  INSTANCES.forEach(i => {
    const p = prev[i.id];
    const c = instanceData[i.id]?.status;
    if (p !== undefined && p !== c) {
      const icons = { offline:'🔴', idle:'🟢', running:'🔵', error:'❌', paused:'🟡' };
      const types = { offline:'warn', idle:'ok', running:'info', error:'err', paused:'warn' };
      addLog(types[c] || 'info', `${icons[c]||'⚪'} Instance ${i.id} [${5500+INSTANCES.findIndex(x=>x.id===i.id)}]: ${p||'?'} → ${c}`);
    }
  });

  if (!silent) {
    const onlineIds = INSTANCES.filter(i => instanceData[i.id]?._online).map(i => i.id).join(' ');
    const offIds    = INSTANCES.filter(i => !instanceData[i.id]?._online).map(i => i.id).join(' ');
    if (onlineIds) addLog('ok',   `✅ Online : ${onlineIds}`);
    if (offIds)    addLog('warn', `⚠️ Offline: ${offIds}`);
  }

  renderCards();
  updateStats();
}

// ── RENDER CARDS ──────────────────────────────
function renderCards() {
  const grid = document.getElementById('instanceGrid');
  grid.innerHTML = '';
  INSTANCES.forEach((inst, idx) => {
    const d      = instanceData[inst.id] || {};
    const status = d.status || 'offline';
    const online = d._online;
    const stCls  = online ? `st-${status}` : '';
    const badge  = online ? `badge-${status}` : 'badge-offline';
    const blabel = online ? (status === 'idle' ? 'ONLINE' : status.toUpperCase()) : 'OFFLINE';
    const col    = { idle:'var(--green)', running:'var(--accent)', error:'var(--red)', paused:'var(--orange)', offline:'var(--muted)' }[status] || 'var(--muted)';
    const step   = d.current_step || (online ? 'Siap' : 'Tidak terhubung');
    const si     = getStepInfo(step);
    const pct    = online ? (status === 'running' ? Math.max(si.pct, 20) : status === 'idle' ? 100 : si.pct) : 0;
    const pfCls  = online ? `pf-${status}` : '';
    const uptime = d.uptime ? fmtUptime(d.uptime) : '—';

    const card = document.createElement('div');
    card.className = `instance-card ${stCls}`;
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-id" style="color:${col}">${inst.id}</div>
          <div class="card-port">:${inst.port}</div>
        </div>
        <span class="card-badge ${badge}">${blabel}</span>
      </div>
      <div class="progress-wrap">
        <span class="progress-label">${si.label || step}</span>
        <div class="progress-track">
          <div class="progress-fill ${pfCls}" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="card-meta">
        <span class="card-videos">🎬 ${d.videos_done ?? 0} video</span>
        <span class="card-uptime">⏱ ${uptime}</span>
      </div>
      <div class="card-actions">
        <button class="card-btn go"   onclick="runInstance('${inst.id}',${inst.port},'start')">▶ Start</button>
        <button class="card-btn halt" onclick="runInstance('${inst.id}',${inst.port},'stop')">⏹ Stop</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function fmtUptime(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function updateStats() {
  const all     = Object.values(instanceData);
  const online  = all.filter(d => d._online).length;
  const running = all.filter(d => d.status === 'running').length;
  const error   = all.filter(d => d.status === 'error').length;
  const videos  = all.reduce((s,d) => s + (d.videos_done||0), 0);
  document.getElementById('statOnline').textContent  = online;
  document.getElementById('statRunning').textContent = running;
  document.getElementById('statError').textContent   = error;
  document.getElementById('statVideos').textContent  = videos;
}

// ── CONTROL ───────────────────────────────────
async function sendRun(port, action) {
  try {
    const res = await fetch(getUrl(port, '/run'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
      signal: AbortSignal.timeout(4000),
    });
    const data = await res.json();
    return { ok: data.ok, msg: data.message };
  } catch {
    return { ok: false, msg: 'Offline' };
  }
}

async function runAll(action) {
  if (!serverIp) return showToast('Isi IP dulu!');
  const labels = { start:'▶ JALANKAN', pause:'⏸ JEDA', stop:'⏹ STOP' };
  addLog('info', `${labels[action]} → semua ${INSTANCES.length} instance...`);
  showToast('⏳ Mengirim perintah...');
  const results = await Promise.all(INSTANCES.map(i => sendRun(i.port, action)));
  const ok   = results.filter(r => r.ok).length;
  const fail = results.length - ok;
  addLog('ok',   `✅ Merespons : ${ok} instance`);
  if (fail) addLog('warn', `⚠️ Tidak merespons: ${fail} instance (mungkin offline)`);
  showToast(`${labels[action]}: ${ok}/${INSTANCES.length} merespons`);
  setTimeout(() => refreshAll(true), 1000);
}

async function runInstance(id, port, action) {
  if (!serverIp) return showToast('Isi IP dulu!');
  const result = await sendRun(port, action);
  if (result.ok) {
    addLog('ok',  `✅ Instance ${id}: ${action} — ${result.msg}`);
    showToast(`✅ ${id} — ${action}`);
  } else {
    addLog('err', `❌ Instance ${id}: tidak merespons (offline?)`);
    showToast(`❌ ${id} tidak merespons`);
  }
  setTimeout(() => refreshAll(true), 800);
}

// ── LOG ───────────────────────────────────────
function addLog(type, msg) {
  const box = document.getElementById('logBox');
  const now = new Date().toTimeString().slice(0,8);
  const el  = document.createElement('div');
  el.className = 'log-entry ' + type;
  el.textContent = `[${now}] ${msg}`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  while (box.children.length > 80) box.removeChild(box.firstChild);
}
function clearLog() { document.getElementById('logBox').innerHTML = ''; }

// ── TOAST ─────────────────────────────────────
let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── AUTO REFRESH ──────────────────────────────
function startAuto() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => refreshAll(true), 10000);
}

// ── INIT ──────────────────────────────────────
document.getElementById('serverIp').value = serverIp;
INSTANCES.forEach(i => { instanceData[i.id] = { status:'offline', _online:false, videos_done:0 }; });
renderCards(); updateStats();

addLog('info', '⚡ NdolGates Control Center aktif');
if (serverIp) {
  addLog('info', `🔌 Konek otomatis ke IP tersimpan: ${serverIp}`);
  setConnectStatus('checking', `Menghubungkan ke ${serverIp}...`, '');
  refreshAll(false).then(startAuto);
} else {
  addLog('warn', '⚠️ IP belum diisi — masukkan IP Tailscale PC kamu lalu klik KONEK');
  setConnectStatus('fail', 'Belum terhubung — isi IP lalu klik KONEK', '');
}
</script>
